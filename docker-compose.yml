services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentpilot-db
    environment:
      POSTGRES_DB: agentpilot
      POSTGRES_USER: agentpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentpilot_dev}
    ports:
      # Host 5433 -> contenedor 5432. Usamos 5433 en el host para no chocar con
      # un PostgreSQL nativo que pueda estar ocupando el 5432 de Windows.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpilot -d agentpilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/AgentPilot.Api/Dockerfile
    container_name: agentpilot-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Database=agentpilot;Username=agentpilot;Password=${POSTGRES_PASSWORD:-agentpilot_dev}
      OpenAI__ApiKey: ${OPENAI_API_KEY:?Define OPENAI_API_KEY en .env}
      OpenAI__ChatModel: ${OPENAI_CHAT_MODEL:-gpt-5-mini}
      Embeddings__Provider: ${EMBEDDINGS_PROVIDER:-openai}
      Embeddings__OllamaBaseUrl: http://ollama:11434
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Proveedor local de embeddings (opcional): docker compose --profile local up
  ollama:
    image: ollama/ollama:latest
    container_name: agentpilot-ollama
    profiles: ["local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  pgdata:
  ollama:
